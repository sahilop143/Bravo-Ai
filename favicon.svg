<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Cyan-to-violet gradient -->
    <linearGradient id="brandGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <!-- Glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="31" fill="#07080f"/>
  <circle cx="32" cy="32" r="31" fill="none" stroke="url(#brandGrad)" stroke-width="0.5" opacity="0.4"/>

  <!-- Geometric B with gradient + glow -->
  <g transform="translate(32, 32)" filter="url(#glow)">
    <!-- Vertical spine -->
    <line x1="-9" y1="-14" x2="-9" y2="14" stroke="url(#brandGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Top arc of B -->
    <path d="M -9 -14 L -2 -14 Q 7 -14 7 -7 Q 7 0 -2 0 L -9 0"
          stroke="url(#brandGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Bottom arc of B (slightly wider) -->
    <path d="M -9 0 L -1 0 Q 9 0 9 7 Q 9 14 -1 14 L -9 14"
          stroke="url(#brandGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Neural dot accents -->
    <circle cx="7" cy="-7" r="1.5" fill="#00E5FF" opacity="0.8"/>
    <circle cx="9" cy="7" r="1.5" fill="#A855F7" opacity="0.8"/>
    <circle cx="-9" cy="0" r="1.5" fill="#00E5FF" opacity="0.6"/>
  </g>
</svg>
