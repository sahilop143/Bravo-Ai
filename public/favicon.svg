<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <circle cx="32" cy="32" r="32" fill="#030303"/>
  
  <!-- Geometric B shape -->
  <g transform="translate(32, 32)">
    <!-- Vertical line of B -->
    <line x1="-8" y1="-12" x2="-8" y2="12" stroke="#00E5FF" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Top bump of B -->
    <path d="M -8 -12 Q 4 -12 4 -6 Q 4 0 -8 0" stroke="#00E5FF" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Bottom bump of B -->
    <path d="M -8 0 Q 6 0 6 6 Q 6 12 -8 12" stroke="#00E5FF" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
